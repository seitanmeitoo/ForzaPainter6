name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}
        working-directory: native

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils
            make

      - name: Build release
        run: make release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vinyl-painter-${{ github.sha }}
          path: native/vinyl-painter.exe
          retention-days: 30
