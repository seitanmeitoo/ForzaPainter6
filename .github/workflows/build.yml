name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}
        working-directory: native

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils
            make

      - name: Build release
        run: make release CFLAGS_RELEASE="-std=c11 -Wall -Wextra -Isrc -Ivendor -DUNICODE -D_UNICODE -O3 -ffast-math -march=x86-64-v2 -flto -DNDEBUG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: forzapainter6-${{ github.sha }}
          path: native/forzapainter6.exe
          retention-days: 30
